name: SupportOpsEnv
version: "1.0.0"
description: >
  A realistic customer support operations environment that challenges agents
  across three tasks of increasing difficulty: email classification, ticket
  prioritization, and structured response generation.

author: "MetaHack Team"
license: "MIT"

# ── Task Registry ──────────────────────────────────────────────────────────────
tasks:
  - id: email_classification
    name: "Email Classification"
    difficulty: easy
    description: >
      Given a customer email, classify it into one of three categories:
      billing, technical, or general.
    observation_schema:
      task_id: string
      email_id: string
      email_text: string
      valid_labels: list[string]
      instruction: string
    action_schema:
      label: string  # one of: billing | technical | general
    reward:
      correct_classification: 1.0
      semantically_close: 0.5
      wrong: 0.0
      invalid_label: -0.2
    num_samples: 10

  - id: ticket_prioritization
    name: "Ticket Prioritization"
    difficulty: medium
    description: >
      Given a support ticket and urgency signals, assign a priority level:
      low, medium, or high.
    observation_schema:
      task_id: string
      ticket_id: string
      ticket_text: string
      urgency_signals: list[string]
      valid_priorities: list[string]
      instruction: string
    action_schema:
      priority: string  # one of: low | medium | high
    reward:
      proportional_distance: true
      underestimate_high_penalty: -0.3
      invalid_label: -0.2
    num_samples: 10

  - id: response_generation
    name: "Response Generation"
    difficulty: hard
    description: >
      Generate a structured JSON response to a customer complaint including
      tone, resolution steps, and escalation decision.
    observation_schema:
      task_id: string
      complaint_id: string
      complaint_text: string
      valid_tones: list[string]
      instruction: string
    action_schema:
      tone: string          # one of: empathetic | formal | apologetic | assertive
      resolution_steps: string
      escalation: boolean
    reward:
      structure_correctness: 0.30
      tone_correctness: 0.20
      escalation_correctness: 0.20
      semantic_similarity: 0.30
      unsafe_content_penalty: -0.30
      short_response_penalty: -0.10
    num_samples: 8

# ── Environment Settings ───────────────────────────────────────────────────────
environment:
  max_steps_per_task: 30
  loop_threshold: 5
  dense_rewards: true

  penalties:
    invalid_action: -0.25
    repeated_action: -0.15
    long_loop: -0.10
    max_steps_exceeded: -0.25

  bonuses:
    perfect_score: 0.05

# ── Scoring ────────────────────────────────────────────────────────────────────
scoring:
  method: mean
  range: [0.0, 1.0]
  per_task_weight:
    email_classification: 1.0
    ticket_prioritization: 1.0
    response_generation: 1.0

# ── Observation / Action / Reward Models ──────────────────────────────────────
models:
  observation:
    class: "env.Observation"
    fields:
      - task_name: string
      - task_difficulty: string
      - step_number: integer
      - sample_index: integer
      - total_samples: integer
      - payload: object
      - done: boolean
      - metadata: object

  action:
    class: "env.Action"
    fields:
      - task_name: string
      - payload: object

  reward:
    class: "env.Reward"
    fields:
      - raw_score: float
      - shaped_reward: float
      - penalties_applied: list[string]
      - bonuses_applied: list[string]
      - cumulative_score: float

# ── API ───────────────────────────────────────────────────────────────────────
api:
  reset:
    description: "Reset the environment. Returns initial Observation."
    returns: Observation

  step:
    description: "Execute one action. Returns (Observation, Reward, done, info)."
    input: Action
    returns:
      - Observation
      - Reward
      - done: boolean
      - info: object

  state:
    description: "Return current environment state as dict."
    returns: object

# ── Entrypoints ───────────────────────────────────────────────────────────────
entrypoints:
  env_class: "env.SupportOpsEnv"
  inference_script: "inference.py"
  app: "app.py"

# ── Runtime ───────────────────────────────────────────────────────────────────
runtime:
  python: ">=3.10"
  dependencies_file: "requirements.txt"
  docker: "Dockerfile"
